```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>21억 무료 나눔</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#mainPage{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffe600,#ff4d00);
}

#mainPage h1{
    background:white;
    padding:25px;
    border-radius:20px;
    font-size:48px;
    text-align:center;
}

button{
    font-size:36px;
    padding:20px 50px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-weight:bold;
    background:#00ff55;
    box-shadow:0 0 30px black;
}

button:hover{
    transform:scale(1.1);
}

#hackScreen{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    color:#00ff00;
    text-align:center;
    overflow:hidden;
}

.glitch{
    color:red;
    font-size:70px;
    margin-top:40px;
    animation:glitch .15s infinite;
    text-shadow:
        4px 0 cyan,
       -4px 0 magenta;
}

@keyframes glitch{
    0%{transform:translate(0);}
    25%{transform:translate(-4px,2px);}
    50%{transform:translate(4px,-2px);}
    75%{transform:translate(-2px,-2px);}
    100%{transform:translate(0);}
}

.flash{
    animation:flash .2s infinite;
}

@keyframes flash{
    0%{background:black;}
    50%{background:#250000;}
    100%{background:black;}
}

#progress{
    width:80%;
    height:35px;
    margin:auto;
    border:2px solid red;
}

#bar{
    width:0%;
    height:100%;
    background:red;
}

#percent{
    color:red;
    font-size:28px;
}

#codeText{
    position:absolute;
    left:20px;
    bottom:20px;
    text-align:left;
    font-family:monospace;
    white-space:pre-line;
    font-size:18px;
    max-height:50%;
    overflow:hidden;
}

canvas{
    position:absolute;
    inset:0;
}
</style>
</head>

<body>

<div id="mainPage">
    <h1>
        진짜 사이트 가짜아님<br>
        21억 무료 나눔 당장 받기
    </h1>

    <button onclick="hack()">
        당장 받기
    </button>
</div>

<div id="hackScreen">
    <canvas id="matrix"></canvas>

    <h1 class="glitch">
        넌 해킹 당했다.
    </h1>

    <div id="progress">
        <div id="bar"></div>
    </div>

    <h2 id="percent">
        개인정보 업로드 중... 0%
    </h2>

    <p id="codeText"></p>
</div>

<script>
function hack(){

    document.getElementById("mainPage").style.display="none";

    const screen=document.getElementById("hackScreen");
    screen.style.display="block";
    screen.classList.add("flash");

    startMatrix();

    let lines=[
        "시스템 접속 중...",
        "파일 분석 중...",
        "비밀번호 찾는 중...",
        "IP 추적 중...",
        "ERROR ERROR ERROR",
        "Minecraft 계정 발견...",
        "Roblox 계정 발견...",
        "고서준 멍청이",
        "구나현 바보",
        "이서원도 바보",
        "김태이 천재",
        "이태헌?"
    ];

    let code=document.getElementById("codeText");
    let i=0;

    setInterval(()=>{
        code.innerText +=
            lines[i % lines.length] + "\n";
        i++;
    },300);

    let p=0;

    setInterval(()=>{
        if(p<100){
            p++;

            document.getElementById("bar")
                .style.width=p+"%";

            document.getElementById("percent")
                .innerText=
                "개인정보 업로드 중... "
                + p + "%";
        }
    },80);
}

function startMatrix(){

    const canvas=
        document.getElementById("matrix");

    const ctx=
        canvas.getContext("2d");

    canvas.width=
        window.innerWidth;

    canvas.height=
        window.innerHeight;

    const chars=
        "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    const fontSize=18;

    const columns=
        canvas.width/fontSize;

    const drops=[];

    for(let x=0;x<columns;x++){
        drops[x]=1;
    }

    setInterval(()=>{

        ctx.fillStyle=
            "rgba(0,0,0,0.05)";

        ctx.fillRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        ctx.fillStyle="#00ff00";
        ctx.font=fontSize+"px monospace";

        for(let i=0;i<drops.length;i++){

            const text=
                chars[Math.floor(
                    Math.random()*chars.length
                )];

            ctx.fillText(
                text,
                i*fontSize,
                drops[i]*fontSize
            );

            if(
                drops[i]*fontSize >
                canvas.height &&
                Math.random() > 0.975
            ){
                drops[i]=0;
            }

            drops[i]++;
        }

    },33);

}
</script>

</body>
</html>
```
